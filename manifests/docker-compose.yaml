name: logistics

services:
  gateway:
    build:
      context: ..
      dockerfile: manifests/Dockerfile
      args:
        SERVICE: gateway
    ports:
      - "8080:8080"

  shipment:
    build:
      context: ..
      dockerfile: manifests/Dockerfile
      args:
        SERVICE: shipment
    ports:
      - "8081:8081"

  shipment-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shipment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  inventory:
    build:
      context: ..
      dockerfile: manifests/Dockerfile
      args:
        SERVICE: inventory
    ports:
      - "8082:8082"

  inventory-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  telemetry:
    build:
      context: ..
      dockerfile: manifests/Dockerfile
      args:
        SERVICE: telemetry
    ports:
      - "8083:8083"

  telemetry-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: telemetry_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
