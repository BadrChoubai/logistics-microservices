name: shipment

services:
  gateway:
    build:
      context: ..
      dockerfile: manifests/gateway/Dockerfile
    environment:
      CONFIG_PATH: "/config.json"
    ports:
      - "8080:8080"

  shipment:
    build:
      context: ..
      dockerfile: manifests/shipment/Dockerfile
    environment:
      CONFIG_PATH: "/config.json"
    ports:
      - "8081:8081"
    depends_on:
      shipment-db:
        condition: service_healthy

  telemetry:
    build:
      context: ..
      dockerfile: manifests/telemetry/Dockerfile
    environment:
      CONFIG_PATH: "/config.json"
    ports:
      - "8083:8083"
    depends_on:
      telemetry-db:
        condition: service_healthy

  shipment-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shipment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shipment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  telemetry-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: telemetry_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemetry_db"]
      interval: 5s
      timeout: 5s
      retries: 5
