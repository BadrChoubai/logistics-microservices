basePath: /
definitions:
  handler.HealthcheckResponse:
    properties:
      status:
        type: string
      version:
        type: string
    type: object
  handler.Item:
    type: object
host: localhost:8081
info:
  contact: {}
  description: Inventory Service for the Logistics Services API platform
  title: Inventory Service
  version: 1.0.0
paths:
  /health:
    get:
      description: Returns service health check response
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthcheckResponse'
      summary: Health check
      tags:
      - system
    head:
      description: Returns service health check response
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthcheckResponse'
      summary: Health check
      tags:
      - system
  /items:
    get:
      description: Returns a list of all items
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.Item'
            type: array
      summary: Get Items
      tags:
      - inventory
    post:
      description: Create a new item
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.Item'
      summary: Create Item
      tags:
      - inventory
  /items/{id}:
    delete:
      description: delete an item from inventory using its id
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/handler.Item'
      summary: delete item
      tags:
      - inventory
    get:
      description: Get an item from inventory using its id
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Item'
      summary: Get Item
      tags:
      - inventory
    put:
      description: update an item from inventory using its id
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/handler.Item'
      summary: update item
      tags:
      - inventory
  /items/{id}/stock:
    put:
      description: update an item's stock count from inventory using its id
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/handler.Item'
      summary: update item stock
      tags:
      - inventory
  /items/low-stock:
    get:
      description: List items from inventory with low stock count
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.Item'
            type: array
      summary: list items from inventory with low stock
      tags:
      - inventory
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
